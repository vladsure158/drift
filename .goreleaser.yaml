version: 2

project_name: drift

builds:
  - main: ./cmd
    binary: drift
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

brews:
  - repository:
      owner: snowtema
      name: homebrew-tap
    homepage: "https://github.com/snowtema/drift"
    description: "Lightweight project tracker for vibe coders"
    license: "MIT"
    install: |
      bin.install "drift"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
